[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "archive-extractor"
version = "0.2.0"
description = "Recursively extract ZIP and 7z archives from directory trees, with password-cracking support"
authors = [
    { name = "Tiago Silva", email = "eng.tiago.silva@gmail.com" }
]
license = "MIT"
readme = "README.md"
dependencies = [
    "tqdm",
    "py7zr"
]
requires-python = ">=3.12"

[project.urls]
Homepage = "https://github.com/tsilva/archive-extractor"
Repository = "https://github.com/tsilva/archive-extractor"
Issues = "https://github.com/tsilva/archive-extractor/issues"

[project.scripts]
archive-extractor = "archive_extractor:main"
