name: Release
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [pyproject.toml]
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run --group dev pytest tests/ -v

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check version
        id: check-version
        uses: tsilva/.github/.github/actions/check-version@main
      - name: Setup uv
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build package
        if: steps.check-version.outputs.tag_exists == 'false'
        run: uv build
      - name: Create GitHub release
        if: steps.check-version.outputs.tag_exists == 'false'
        run: gh release create "${{ steps.check-version.outputs.tag }}" --title "${{ steps.check-version.outputs.tag }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
